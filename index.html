<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
  <meta name="mobile-web-app-capable" content="yes">
  <title>ダンス練習アプリ</title>
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div class="panel" id="panel-left">
      <div class="panel-label">見本</div>
      <video id="reference-video" playsinline webkit-playsinline></video>
      <div id="upload-area" class="upload-area">
        <p>タップして<br>見本動画を選択</p>
        <input type="file" id="file-input" accept="video/*">
      </div>
    </div>
    <div class="panel" id="panel-right">
      <div class="panel-label">自分</div>
      <video id="camera-video" autoplay playsinline webkit-playsinline muted></video>
    </div>
  </div>
  <div id="controls">
    <button id="btn-play">再生</button>
    <button id="btn-pause">停止</button>
    <div class="speed-control">
      <span>速度</span>
      <button class="speed-btn" data-speed="0.5">0.5x</button>
      <button class="speed-btn" data-speed="0.75">0.75x</button>
      <button class="speed-btn active" data-speed="1">1x</button>
    </div>
    <button id="btn-camera">カメラ切替</button>
  </div>
  <script src="script.js"></script>
</body>
</html>
